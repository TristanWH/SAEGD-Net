data:
  image_size: [256, 256]
  in_channels: 1
  event_bins: 3
  saturation_threshold: 0.98
  soft_mask_tau: 0.92
  soft_mask_eta: 0.02
  event_filter:
    enabled: true
    spatial_radius: 1
    temporal_window_us: 500
    min_neighbors: 2

model:
  base_channels: 64
  channel_mults: [1, 2, 4, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 32]
  dropout: 0.0
  use_cross_attention: true
  use_event_film: true
  use_laplacian: true
  concat_only: false

diffusion:
  timesteps: 1000
  beta_schedule: cosine
  sampling: ddim
  sampling_steps: 50
  objective: eps

eval:
  device: cuda
  event_edge_tolerance_px: 2
  runtime_hardware: "NVIDIA GeForce RTX 4090"
