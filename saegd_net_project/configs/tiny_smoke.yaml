seed: 7

data:
  root: data/smoke
  train_manifest: data/smoke/train.txt
  val_manifest: data/smoke/val.txt
  test_manifest: data/smoke/test.txt
  image_size: [64, 64]
  in_channels: 1
  event_bins: 2
  saturation_threshold: 0.95
  soft_mask_tau: 0.85
  soft_mask_eta: 0.03
  event_filter:
    enabled: false
    spatial_radius: 1
    temporal_window_us: 500
    min_neighbors: 1
  dense_reference_required_for_full_metrics: true

model:
  base_channels: 16
  channel_mults: [1, 2]
  num_res_blocks: 1
  attention_resolutions: []
  dropout: 0.0
  use_cross_attention: true
  use_event_film: true
  use_laplacian: true
  concat_only: false

diffusion:
  timesteps: 50
  beta_schedule: linear
  sampling: ddim
  sampling_steps: 10
  objective: eps

loss:
  lambda_sat: 1.0
  lambda_valid: 0.5
  lambda_edge: 0.2
  lambda_event: 0.3
  lambda_perc: 0.0
  lambda_temp: 0.0

train:
  run_dir: runs/tiny_smoke
  epochs: 1
  batch_size: 2
  num_workers: 0
  lr: 0.0005
  weight_decay: 0.0
  grad_clip: 1.0
  amp: false
  save_every: 1
  validate_every: 1
  log_every: 1
  device: cpu

eval:
  batch_size: 1
  device: cpu
  event_edge_tolerance_px: 2
  runtime_hardware: "CPU smoke test"
